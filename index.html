<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Защищённый доступ к паролям</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #f1f5f9; }
  .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .logo { text-align: center; margin-bottom: 28px; color: #38bdf8; }
  h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
  p.sub { color: #94a3b8; font-size: 13px; text-align: center; margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input[type=password], input[type=text] {
    width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; color: #f1f5f9; font-size: 20px; letter-spacing: 8px; text-align: center;
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: #38bdf8; }
  button.main {
    width: 100%; margin-top: 20px; padding: 14px; background: #38bdf8; border: none;
    border-radius: 10px; color: #0f172a; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  button.main:hover { background: #0ea5e9; }
  button.main:disabled { opacity: .6; cursor: not-allowed; }
  .error { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; }
  .info { color: #94a3b8; font-size: 12px; text-align: center; margin-top: 16px; }
  .warning { background: #451a03; border: 1px solid #92400e; border-radius: 8px; padding: 12px 16px; color: #fbbf24; font-size: 12px; margin-bottom: 20px; }
  /* Results */
  .pw-item { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
  .pw-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .pw-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; flex-wrap: wrap; gap: 4px; }
  .pw-label { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
  .pw-value { color: #38bdf8; font-family: monospace; font-size: 13px; word-break: break-all; }
  .badge { background: #1e3a5f; color: #38bdf8; font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .copy-btn { background: none; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .copy-btn:hover { background: #1e293b; color: #f1f5f9; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media print { button, .warning { display: none; } body { background: white; color: black; } .card { box-shadow: none; } .pw-value { color: black; } }
</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
  </div>

  <div id="formSection">
    <h1>Защищённый доступ</h1>
    <p class="sub">Введите PIN-код, полученный от отправителя, чтобы просмотреть пароли.</p>
    <div class="warning">⚠️ Эта ссылка одноразовая. После просмотра она станет недействительной.</div>
    <div>
      <label>PIN-код</label>
      <input type="password" id="pinInput" placeholder="••••" maxlength="8" inputmode="numeric" autofocus>
    </div>
    <button class="main" id="btnSubmit" onclick="submitPin()">Открыть</button>
    <div class="error" id="errorMsg"></div>
    <div class="info">🔒 Данные передаются по защищённому каналу (AES-256)</div>
  </div>

  <div id="results" style="display:none">
    <h1 style="margin-bottom:8px">Пароли компании</h1>
    <p class="sub" style="margin-bottom:20px">Данные доступны только в этом сеансе.</p>
    <div id="pwdItems"></div>
    <button class="main" onclick="window.print()" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;margin-top:16px">🖨️ Распечатать</button>
  </div>

</div>

<script>
// Get token and server URL from URL params
const params = new URLSearchParams(location.search);
const TOKEN  = params.get('token') || '';
const SERVER = params.get('server') || 'https://app-88788feec0d7.vibecode.bitrix24.tech';

if (!TOKEN) {
  document.getElementById('errorMsg').textContent = 'Токен не найден в ссылке.';
  document.getElementById('btnSubmit').disabled = true;
}

document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPin();
});

async function submitPin() {
  const pin = document.getElementById('pinInput').value;
  if (!pin) return;
  const btn = document.getElementById('btnSubmit');
  btn.innerHTML = '<span class="spinner"></span>Проверка...';
  btn.disabled = true;
  document.getElementById('errorMsg').textContent = '';

  try {
    const res = await fetch(`${SERVER}/share/${encodeURIComponent(TOKEN)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const data = await res.json();

    if (!res.ok || data.error) throw new Error('Неверный PIN или ссылка недействительна.');

    renderPasswords(data.items || []);
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('results').style.display = 'block';
  } catch(e) {
    document.getElementById('errorMsg').textContent = e.message;
    btn.innerHTML = 'Открыть';
    btn.disabled = false;
  }
}

function renderPasswords(items) {
  const el = document.getElementById('pwdItems');
  if (!items.length) { el.innerHTML = '<p style="color:#94a3b8;text-align:center">Нет записей</p>'; return; }
  el.innerHTML = items.map(p => `
    <div class="pw-item">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span class="pw-title">${esc(p.title)}</span>
        <span class="badge">${esc(p.category)}</span>
      </div>
      ${p.url ? `<div class="pw-row"><span class="pw-label">URL</span><a href="${esc(p.url)}" target="_blank" class="pw-value">${esc(p.url)}</a></div>` : ''}
      ${p.login ? `<div class="pw-row"><span class="pw-label">Логин</span><span class="pw-value">${esc(p.login)}</span><button class="copy-btn" onclick="copy('${esc(p.login)}',this)">Копировать</button></div>` : ''}
      <div class="pw-row"><span class="pw-label">Пароль</span><span class="pw-value">${esc(p.password)}</span><button class="copy-btn" onclick="copy('${esc(p.password)}',this)">Копировать</button></div>
      ${p.notes ? `<div class="pw-row"><span class="pw-label">Заметки</span><span class="pw-value" style="color:#94a3b8">${esc(p.notes)}</span></div>` : ''}
    </div>`).join('');
}

function copy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
